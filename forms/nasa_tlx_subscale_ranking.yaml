id: nasa_tlx_subscale_ranking
name: "NASA-TLX Subscale Weighting"
name_fr: "Pondération des sous-échelles NASA-TLX"
language: en
bilingual: true
instructions: |
  You will be presented with a series of pairs of rating scale titles and asked to choose which was more important to your experience of workload in the task(s) you just performed.

  Tap the scale title that represents the more important contributor to workload for the specific task you performed. Consider your choices carefully. There is no correct pattern — we are only interested in your opinions.
instructions_fr: |
  On vous présentera une série de paires de titres d'échelles et on vous demandera de choisir laquelle était la plus importante pour votre expérience de la charge de travail dans la ou les tâches que vous venez d'effectuer.

  Sélectionnez le titre de l'échelle qui représente le facteur le plus important de la charge de travail pour la tâche spécifique que vous avez effectuée. Réfléchissez bien à vos choix. Il n'y a pas de bonne réponse — seule votre opinion nous intéresse.

questions:

  - id: pair_01
    type: single_choice
    label: "Which scale was more important to your experience of workload?"
    label_fr: "Quelle échelle était la plus importante pour votre expérience de la charge de travail ?"
    description: |
      EFFORT [Low / High] — How hard did you have to work (mentally and physically) to accomplish your level of performance?

      PERFORMANCE [Good / Poor] — How successful do you think you were in accomplishing the goals of the task set by the experimenter (or yourself)? How satisfied were you with your performance in accomplishing these goals?
    description_fr: |
      EFFORT [Faible / Élevé] — À quel point avez-vous dû travailler (mentalement et physiquement) pour accomplir votre niveau de performance ?

      PERFORMANCE [Bonne / Mauvaise] — Dans quelle mesure pensez-vous avoir réussi à atteindre les objectifs de la tâche définis par l'expérimentateur (ou par vous-même) ? Étiez-vous satisfait(e) de votre performance dans l'accomplissement de ces objectifs ?
    options: ["Effort", "Performance"]
    options_fr: ["Effort", "Performance"]

  - id: pair_02
    type: single_choice
    label: "Which scale was more important to your experience of workload?"
    label_fr: "Quelle échelle était la plus importante pour votre expérience de la charge de travail ?"
    description: |
      TEMPORAL DEMAND [Low / High] — How much time pressure did you feel due to the rate or pace at which the tasks or task elements occurred? Was the pace slow and leisurely or rapid and frantic?

      FRUSTRATION LEVEL [Low / High] — How insecure, discouraged, irritated, stressed and annoyed versus secure, gratified, content, relaxed and complacent did you feel during the task?
    description_fr: |
      EXIGENCE TEMPORELLE [Faible / Élevée] — Quelle pression temporelle avez-vous ressentie en raison du rythme auquel les tâches ou leurs éléments se succédaient ? Le rythme était-il lent et tranquille, ou rapide et frénétique ?

      NIVEAU DE FRUSTRATION [Faible / Élevé] — Dans quelle mesure vous êtes-vous senti(e) incertain(e), découragé(e), irrité(e), stressé(e) et agacé(e), par opposition à en sécurité, satisfait(e), détendu(e) et serein(e) pendant la tâche ?
    options: ["Temporal Demand", "Frustration"]
    options_fr: ["Exigence temporelle", "Frustration"]

