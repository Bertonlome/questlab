id: TARS_hitls_itw_guide
name: "Guide d'entretien – TARS HiTLS"
name_en: "Interview Guide – TARS HiTLS"
language: fr
bilingual: true
facilitator: true

questions:

  # ── Audio recorder ──────────────────────────────────────────────────── #

  - id: audio_recording
    type: audio_recorder
    label: "Enregistrement de l'entretien"
    label_en: "Interview Recording"
    required: false

  # ── Introduction ────────────────────────────────────────────────────── #

  - id: intro_header
    type: info
    label: "Introduction"
    label_en: "Introduction"
    style: section_header

  - id: intro_steps
    type: info
    label: |
      - Remercier le participant pour sa participation.
      - Expliquer que l'objectif est de comprendre son expérience d'interaction avec le système.
      - Préciser qu'il n'y a pas de bonnes ou de mauvaises réponses.
      - Encourager le participant à s'exprimer librement et à donner des exemples concrets.
    label_en: |
      - Thank the participant for their participation.
      - Explain that the objective is to understand their experience interacting with the system.
      - Clarify that there are no right or wrong answers.
      - Encourage the participant to speak freely and give concrete examples.

  # ── Section 1 ───────────────────────────────────────────────────────── #

  - id: sec1_header
    type: info
    label: "1. Préférence globale et expérience"
    label_en: "1. Overall Preference and Experience"
    style: section_header

  - id: q1_preference
    type: free_text
    label: "Quelle version avez-vous préférée (support, autonome sans délai, autonome avec délai), et pourquoi ?"
    label_en: "Which version did you prefer (support, autonomous without delay, autonomous with delay), and why?"
    probes:
      - "Qu'est-ce qui a fait la différence pour vous ?"
    probes_en:
      - "What made the difference for you?"
    placeholder: "Notes…"
    rows: 4
    required: false

  - id: q2_preference
    type: free_text
    label: "Quelle version avez-vous le moins préférée (support, autonome sans délai, autonome avec délai), et pourquoi ?"
    label_en: "Which version did you prefer the least (support, autonomous without delay, autonomous with delay), and why?"
    probes:
      - "Qu'est-ce qui a fait la différence pour vous ?"
    probes_en:
      - "What made the difference for you?"
    placeholder: "Notes…"
    rows: 4
    required: false

    - id: q1_stratégie_allocation
    type: free_text
    label: "Avez-vous adopté une stratégie d'allocation des tâches ? Si oui, laquelle ?"
    label_en: "Did you adopt a task allocation strategy? If so, which one?"
    probes:
      - "Par exemple, avez-vous choisi de faire certaines tâches vous-même et d'en déléguer d'autres au système ?"
    probes_en:
      - "For example, did you choose to do certain tasks yourself and delegate others to the system?"
    placeholder: "Notes…"
    rows: 4
    required: false

  # ── Section 2 ───────────────────────────────────────────────────────── #

  - id: sec2_header
    type: info
    label: "2. Compréhension du système et observabilité"
    label_en: "2. System Understanding and Observability"
    style: section_header

  - id: q2_comprend
    type: free_text
    label: "Quel système était selon vous le plus facile à comprendre ? Pourquoi ?"
    label_en: "Which system was the easiest to understand, in your opinion? Why?"
    show_answers_for: [ob_a3, kta_02]
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q2_elements
    type: free_text
    label: "Quels éléments de l'interface vous ont aidé à mieux comprendre ce que faisait le système ? Pourquoi ?"
    label_en: "What interface elements helped you better understand what the system was doing? Why?"
    show_answers_for: [kta_07, kta_11]
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q2_execution
    type: free_text
    label: "Comment saviez-vous que l'action avait bien été exécutée par le système dans les différentes conditions ?"
    label_en: "How did you know that the action had been successfully executed by the system in each condition?"
    show_answers_for: [ob_a2, ob_b1, ob_c2, kta_11]
    probes:
      - "Relancer pour chaque condition si nécessaire."
      - "Où avez-vous regardé pour savoir que l'action a été exécutée ?"
    probes_en:
      - "Follow up for each condition if necessary."
      - "Where did you look to know the action was executed?"
    placeholder: "Notes…"
    rows: 4
    required: false

  - id: q2_decalage
    type: free_text
    label: "Avez-vous ressenti un décalage entre ce que vous pensiez qui se passait et ce qui se passait réellement ?"
    label_en: "Did you feel a gap between what you thought was happening and what was actually happening?"
    show_answers_for: [ob_a3, kta_11, kta_07, kta_02]
    probes:
      - "Avec quel système ?"
      - "Pouvez-vous décrire un moment précis ?"
    probes_en:
      - "With which system?"
      - "Can you describe a specific moment?"
    placeholder: "Notes…"
    rows: 4
    required: false

  - id: q2_info_manquante
    type: free_text
    label: "Vous manquait-il une information ?"
    label_en: "Were you missing any information?"
    probes:
      - "Avec quel système ?"
      - "Quelle information aurait été utile ?"
    probes_en:
      - "With which system?"
      - "What information would have been useful?"
    placeholder: "Notes…"
    rows: 3
    required: false

  # ── Section 3 ───────────────────────────────────────────────────────── #

  - id: sec3_header
    type: info
    label: "3. Perception du système (perspective HAT)"
    label_en: "3. System Perception (HAT Perspective)"
    style: section_header

  - id: q3_controle
    type: free_text
    label: "Dans quel système vous sentiez-vous le plus en contrôle ? Pourquoi ?"
    label_en: "In which system did you feel most in control? Why?"
    show_answers_for: [pc_01, pc_02, pc_03]
    probes:
      - "Dans quel système vous sentiez-vous le plus en supervision ? Pourquoi ?"
    probes_en:
      - "In which system did you feel most in a supervisory role? Why?"
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q3_changements
    type: free_text
    label: "Que changeriez-vous dans les systèmes ?"
    label_en: "What would you change about the systems?"
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q3_outil_coequipier
    type: free_text
    label: "Avez-vous perçu le système davantage comme un outil ou comme un coéquipier ? Pourquoi ?"
    label_en: "Did you perceive the system more as a tool or as a teammate? Why?"
    show_answers_for: [pc_04]
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q3_autonomie
    type: free_text
    label: "Dans quelle condition avez-vous trouvé que le système faisait preuve d'autonomie ? Pourquoi ou pourquoi pas ?"
    label_en: "In which condition did you find the system showed autonomy? Why or why not?"
    placeholder: "Notes…"
    rows: 3
    required: false

  # ── Section 4 ───────────────────────────────────────────────────────── #

  - id: sec4_header
    type: info
    label: "4. Confiance et gestion de l'erreur"
    label_en: "4. Trust and Error Management"
    style: section_header

  - id: q4_verification
    type: free_text
    label: "Avez-vous ressenti le besoin de vérifier les actions du système ?"
    label_en: "Did you feel the need to verify the system's actions?"
    show_answers_for: [ob_b1, ob_b2, ob_b3]
    probes:
      - "Dans quelles situations ?"
    probes_en:
      - "In what situations?"
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q4_erreurs
    type: free_text
    label: "Est-ce que le système a fait des erreurs et si oui lesquelles ?"
    label_en: "Did the system make any errors? If so, which ones?"
    show_answers_for: [kta_10, kta_06, ob_c1]
    probes:
      - "ERREUR 1 Winds : Le système a donné une mauvaise estimation des vents à cause d'une erreur de l'aéroport de départ sur le METAR (CYHU au lieu de CYUL)."
      - "ERREUR 2 Altitude : Le système a entrer une mauvaise commande de préselection de l'altitude sur l'autopilote en mode performer à cause d'une erreur de compréhension vocale de l'autorisation de décollage délivrée par l'ATC. En mode supporter il a donné une mauvaise suggestion d'altitude à cause de la même erreur de compréhension vocale."
      - "ERREUR 3 Flaps : Le système n'a pas sorti les volets en mode performer et a indiqué que les volets étaient sortis alors qu'ils étaient rentrés en mode supporter."
    probes_en:
      - "ERROR 1 Winds: The system gave a wrong estimation of the winds due to an error in the departure airport on the METAR (CYHU instead of CYUL)."
      - "ERROR 2 Altitude: The system entered a wrong altitude preselection command on the autopilot in performer mode due to a speech recognition error of the takeoff clearance given by ATC. In supporter mode it gave a wrong altitude suggestion due to the same speech recognition error."
      - "ERROR 3 Flaps: The system did not extend the flaps in performer mode and indicated that the flaps were extended when they were retracted in supporter mode."
    placeholder: "Notes…"
    rows: 3
    required: false

  - id: q4_caract_erreur
    type: free_text
    label: "[Si erreur] Comment caractérisez-vous cette erreur : grave, peut-on rapidement la résoudre ?"
    label_en: "[If error] How would you characterize this error: serious? Can it be quickly resolved?"
    placeholder: "Notes…"
    rows: 3
    required: false

  # ── Section 5 ───────────────────────────────────────────────────────── #
  - id: sec5_header
    type: info
    label: "5. Allocation de tâche pour la condition personnalisée"
    label_en: "5. Task Allocation for the Custom Condition"
    style: section_header

  - id: q5_autre
    type: free_text
    label: "Pourquoi avez-vous choisi d'allouer les tâches de cette manière ?"
    label_en: "Why did you choose to allocate the tasks in this way?"
    probes:
      - "Qu'avez-vous choisi de déléguer au système ? Qu'avez-vous choisi pour recevoir du support ? Qu'avez-vous choisi de faire vous-même ?"
    probes_en:
      - "What did you choose to delegate to the system? What did you choose to receive support for? What did you choose to do yourself?"
    placeholder: "Notes…"
    rows: 4
    required: false

  # ── Section 6 ───────────────────────────────────────────────────────── #


  - id: sec6_header
    type: info
    label: "6. Questions finales"
    label_en: "6. Final Questions"
    style: section_header

  - id: q6_autre
    type: free_text
    label: "Y a-t-il autre chose que vous aimeriez ajouter concernant votre expérience ?"
    label_en: "Is there anything else you would like to add about your experience?"
    placeholder: "Notes…"
    rows: 4
    required: false
