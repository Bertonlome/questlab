id: ueq_plus_customized
name: "Échelle d'utilisabilité du système"
name_en: "System Usability Scale"
language: fr
bilingual: true
instructions: |
  Ce questionnaire se compose de paires de propriétés opposées que peut avoir le système. La gradation entre les contraires est représentée par des cercles. En cochant l'un de ces cercles, vous pouvez exprimer votre approbation d'un concept.

  Exemple : si vous choisissez le cercle 2 sur une ligne "Attractif / Rébarbatif", cela indique que vous jugez le système plus attractif que rébarbatif.
instructions_en: |
  This questionnaire consists of pairs of opposing properties that the system may have. The gradation between opposites is represented by circles. By selecting one of these circles, you can express your level of agreement with a concept.

  Example: if you select circle 2 on an "Attractive / Unattractive" row, this indicates that you consider the system more attractive than unattractive.

